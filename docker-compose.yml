services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n_test
    restart: always
    ports:
      - "5678:5678"
    environment:
      - N8N_LOG_LEVEL=debug
    volumes:
      - n8n_data:/home/node/.n8n
      - .:/opt/custom-nodes/n8n-nodes-vocallabs:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mkdir -p /home/node/.n8n/nodes
        cd /home/node/.n8n/nodes
        npm init -y 2>/dev/null
        npm install /opt/custom-nodes/n8n-nodes-vocallabs 2>&1
        cd /home/node
        exec n8n start

volumes:
  n8n_data:
